name: CI

on:
  push:
    branches: [master]
    tags: ['v*']
  pull_request:
    branches: [master]

env:
  NODE_VERSION: '24'

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.15.0
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
          cache-dependency-path: |
            services/web-backend/pnpm-lock.yaml
            services/frontend/pnpm-lock.yaml
      - name: Install backend dependencies
        run: pnpm install
        working-directory: services/web-backend
      - name: Generate Prisma client
        run: pnpm prisma generate
        working-directory: services/web-backend
      - name: Install frontend dependencies
        run: pnpm install --ignore-scripts
        working-directory: services/frontend

      - name: Lint frontend (prettier)
        run: pnpm prettier --check src/
        working-directory: services/frontend
      - name: Lint backend (eslint)
        run: pnpm lint
        working-directory: services/web-backend

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.15.0
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
          cache-dependency-path: |
            services/web-backend/pnpm-lock.yaml
            services/frontend/pnpm-lock.yaml
      - name: Install backend dependencies
        run: pnpm install
        working-directory: services/web-backend
      - name: Generate Prisma client
        run: pnpm prisma generate
        working-directory: services/web-backend
      - name: Install frontend dependencies
        run: pnpm install --ignore-scripts
        working-directory: services/frontend

      - name: Typecheck frontend
        run: pnpm typecheck
        working-directory: services/frontend
      - name: Typecheck backend
        run: pnpm typecheck
        working-directory: services/web-backend

  test-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.15.0
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
          cache-dependency-path: services/web-backend/pnpm-lock.yaml
      - name: Install dependencies
        run: pnpm install
        working-directory: services/web-backend
      - name: Generate Prisma client
        run: pnpm prisma generate
        working-directory: services/web-backend
      - name: Run tests
        run: pnpm test
        working-directory: services/web-backend
        env:
          JWT_SECRET: ci-secret

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.15.0
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
          cache-dependency-path: |
            services/web-backend/pnpm-lock.yaml
            services/frontend/pnpm-lock.yaml
      - name: Install backend dependencies
        run: pnpm install
        working-directory: services/web-backend
      - name: Generate Prisma client
        run: pnpm prisma generate
        working-directory: services/web-backend
      - name: Install frontend dependencies
        run: pnpm install --ignore-scripts
        working-directory: services/frontend

      - name: Build backend
        run: pnpm build
        working-directory: services/web-backend
      - name: Build frontend
        run: pnpm build
        working-directory: services/frontend

  docker-verify:
    runs-on: ubuntu-latest
    needs: [build, test-backend, test-frontend]

    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_USER: quizztine
          POSTGRES_PASSWORD: quizztine
          POSTGRES_DB: quizztinedb
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: quizztine:ci-test

      - name: Smoke test — start container and wait for healthy
        run: |
          # Start the app container on the host network so it reaches Postgres
          docker run -d --name quizztine-smoke \
            --network host \
            -e DATABASE_URL=postgresql://quizztine:quizztine@localhost:5432/quizztinedb \
            -e JWT_SECRET=ci-smoke-secret \
            -e NODE_ENV=production \
            quizztine:ci-test

          # Wait up to 60s for Docker healthcheck to succeed
          for i in $(seq 1 30); do
            status=$(docker inspect --format='{{.State.Health.Status}}' quizztine-smoke 2>/dev/null || echo "starting")
            echo "[$i/30] health: $status"
            case "$status" in
              healthy)
                echo "✅ Container is healthy — app started, DB connected"
                docker stop quizztine-smoke
                exit 0
                ;;
              unhealthy)
                echo "❌ Container is unhealthy"
                docker logs quizztine-smoke
                docker stop quizztine-smoke
                exit 1
                ;;
            esac
            sleep 2
          done

          echo "❌ Timeout — container never became healthy"
          docker logs quizztine-smoke
          docker stop quizztine-smoke
          exit 1

  test-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.15.0
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
          cache-dependency-path: services/frontend/pnpm-lock.yaml
      - name: Install dependencies
        run: pnpm install --ignore-scripts
        working-directory: services/frontend
      - name: Run tests
        run: pnpm test
        working-directory: services/frontend

  docker-publish:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [lint, typecheck, test-backend, build, test-frontend, docker-verify]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Generate release notes
        id: release_notes
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          name: Quizztine ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
