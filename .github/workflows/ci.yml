name: CI

on:
  push:
    branches: [master]
    tags: ['v*']
  pull_request:
    branches: [master]

env:
  NODE_VERSION: '24'

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.15.0
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
          cache-dependency-path: |
            services/web-backend/pnpm-lock.yaml
            services/frontend/pnpm-lock.yaml
      - name: Install backend dependencies
        run: pnpm install
        working-directory: services/web-backend
      - name: Generate Prisma client
        run: pnpm prisma generate
        working-directory: services/web-backend
      - name: Install frontend dependencies
        run: pnpm install --ignore-scripts
        working-directory: services/frontend

      - name: Lint frontend (prettier)
        run: pnpm prettier --check src/
        working-directory: services/frontend
      - name: Lint backend (eslint)
        run: pnpm lint
        working-directory: services/web-backend

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.15.0
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
          cache-dependency-path: |
            services/web-backend/pnpm-lock.yaml
            services/frontend/pnpm-lock.yaml
      - name: Install backend dependencies
        run: pnpm install
        working-directory: services/web-backend
      - name: Generate Prisma client
        run: pnpm prisma generate
        working-directory: services/web-backend
      - name: Install frontend dependencies
        run: pnpm install --ignore-scripts
        working-directory: services/frontend

      - name: Typecheck frontend
        run: pnpm typecheck
        working-directory: services/frontend
      - name: Typecheck backend
        run: pnpm typecheck
        working-directory: services/web-backend

  test-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.15.0
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
          cache-dependency-path: services/web-backend/pnpm-lock.yaml
      - name: Install dependencies
        run: pnpm install
        working-directory: services/web-backend
      - name: Generate Prisma client
        run: pnpm prisma generate
        working-directory: services/web-backend
      - name: Run tests
        run: pnpm test
        working-directory: services/web-backend
        env:
          JWT_SECRET: ci-secret

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.15.0
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
          cache-dependency-path: |
            services/web-backend/pnpm-lock.yaml
            services/frontend/pnpm-lock.yaml
      - name: Install backend dependencies
        run: pnpm install
        working-directory: services/web-backend
      - name: Generate Prisma client
        run: pnpm prisma generate
        working-directory: services/web-backend
      - name: Install frontend dependencies
        run: pnpm install --ignore-scripts
        working-directory: services/frontend

      - name: Build backend
        run: pnpm build
        working-directory: services/web-backend
      - name: Build frontend
        run: pnpm build
        working-directory: services/frontend

  test-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.15.0
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
          cache-dependency-path: services/frontend/pnpm-lock.yaml
      - name: Install dependencies
        run: pnpm install --ignore-scripts
        working-directory: services/frontend
      - name: Run tests
        run: pnpm test
        working-directory: services/frontend

  docker-publish:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [lint, typecheck, test-backend, build, test-frontend]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Generate release notes
        id: release_notes
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          name: Quizztine ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
