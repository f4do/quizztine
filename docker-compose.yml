services:
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: quizztine
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "3000:3000"
      - "5173:5173"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/quizztine
      JWT_SECRET: dev-secret-change-in-production
      CORS_ORIGIN: http://localhost:5173
      UPLOAD_DIR: /app/uploads
    volumes:
      - ./services/web-backend/src:/app/web-backend/src
      - ./services/web-backend/prisma:/app/web-backend/prisma
      - ./services/frontend/src:/app/frontend/src
      - ./services/frontend/public:/app/frontend/public
      - ./services/frontend/index.html:/app/frontend/index.html
      - ./services/frontend/vite.config.ts:/app/frontend/vite.config.ts
      - ./services/frontend/vitest.config.ts:/app/frontend/vitest.config.ts
      - uploads:/app/uploads

volumes:
  pgdata:
  uploads:
