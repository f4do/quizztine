services:
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: quizztine
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  web-backend:
    build:
      context: ./services/web-backend
      dockerfile: Dockerfile.dev
    depends_on:
      - postgres
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/quizztine
      JWT_SECRET: dev-secret-change-in-production
      CORS_ORIGIN: http://localhost:5173
      UPLOAD_DIR: /app/uploads
    volumes:
      - ./services/web-backend/src:/app/src
      - ./services/web-backend/prisma:/app/prisma
      - uploads:/app/uploads

  frontend:
    build:
      context: ./services/frontend
      dockerfile: Dockerfile.dev
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:3000
      VITE_DEFAULT_LANG: fr
    volumes:
      - ./services/frontend/public:/app/public
      - ./services/frontend/src:/app/src
      - ./services/frontend/index.html:/app/index.html
      - ./services/frontend/vite.config.ts:/app/vite.config.ts
      - ./services/frontend/tsconfig.json:/app/tsconfig.json
      - ./services/frontend/tsconfig.app.json:/app/tsconfig.app.json

volumes:
  pgdata:
  uploads:
